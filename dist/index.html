    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f0f4f9" />
    <title>NT2 Staatsexamen</title>
    <!-- Prevent flash of wrong theme on page load -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('nt2-theme');
          if (raw) {
            var state = JSON.parse(raw);
            if (state && state.state && state.state.isDark) {
              document.documentElement.setAttribute('data-theme', 'dark');
              document.querySelector('meta[name="theme-color"]')
                && document.querySelector('meta[name="theme-color"]').setAttribute('content', '#04080f');
            }
          }
        } catch (e) {}
      })();
    </script>
