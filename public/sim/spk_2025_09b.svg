<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <text x="180" y="22" font-size="11" fill="#f5c432" text-anchor="middle" font-family="monospace" font-weight="bold">2 · VLUCHTROUTE VOLGEN</text>
  <!-- Floor plan / corridor top view -->
  <!-- Corridor -->
  <rect x="30" y="80" width="300" height="100" rx="4" fill="#080f1e" stroke="#172840" stroke-width="2"/>
  <!-- Rooms -->
  <rect x="30" y="80" width="100" height="50" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <text x="80" y="110" font-size="9" fill="#6d8faa" text-anchor="middle" font-family="monospace">kamer A</text>
  <rect x="130" y="80" width="100" height="50" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <text x="180" y="110" font-size="9" fill="#6d8faa" text-anchor="middle" font-family="monospace">kamer B</text>
  <rect x="230" y="80" width="100" height="50" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <text x="280" y="110" font-size="9" fill="#6d8faa" text-anchor="middle" font-family="monospace">kamer C</text>
  <!-- Corridor walkway -->
  <rect x="30" y="130" width="300" height="50" fill="#080f1e"/>
  <!-- Arrow route along corridor -->
  <line x1="280" y1="155" x2="60" y2="155" stroke="#30d080" stroke-width="3" stroke-dasharray="10,5"/>
  <polygon points="52,155 68,148 68,162" fill="#30d080"/>
  <!-- Nooduitgang sign -->
  <rect x="30" y="140" width="28" height="30" rx="3" fill="#30d080" opacity="0.3" stroke="#30d080" stroke-width="2"/>
  <text x="44" y="152" font-size="7" fill="#30d080" text-anchor="middle" font-family="monospace">NOOD</text>
  <text x="44" y="162" font-size="7" fill="#30d080" text-anchor="middle" font-family="monospace">UITG.</text>
  <!-- Running figures on route -->
  <circle cx="200" cy="152" r="8" fill="#d8ebff" opacity="0.15" stroke="#d8ebff" stroke-width="1"/>
  <circle cx="240" cy="152" r="8" fill="#d8ebff" opacity="0.15" stroke="#d8ebff" stroke-width="1"/>
  <circle cx="280" cy="152" r="8" fill="#d8ebff" opacity="0.15" stroke="#d8ebff" stroke-width="1"/>
  <!-- No lift sign -->
  <rect x="300" y="85" width="28" height="28" rx="3" fill="#0a1828" stroke="#f5c432" stroke-width="2"/>
  <text x="314" y="97" font-size="10" text-anchor="middle" fill="#f5c432">🚫</text>
  <text x="314" y="108" font-size="7" text-anchor="middle" fill="#f5c432" font-family="monospace">lift!</text>
  <!-- Bottom instruction -->
  <rect x="40" y="205" width="280" height="40" rx="6" fill="#30d080" opacity="0.08" stroke="#30d080" stroke-width="1"/>
  <text x="180" y="222" font-size="9" fill="#30d080" text-anchor="middle" font-family="monospace">Kalm blijven — vluchtroute volgen</text>
  <text x="180" y="235" font-size="9" fill="#30d080" text-anchor="middle" font-family="monospace">Nooit de lift gebruiken!</text>
</svg>
