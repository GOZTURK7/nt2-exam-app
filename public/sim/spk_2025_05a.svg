<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <text x="180" y="22" font-size="11" fill="#f5c432" text-anchor="middle" font-family="monospace" font-weight="bold">1 · INTRODUCTIEGESPREK</text>
  <!-- Table -->
  <rect x="80" y="130" width="200" height="8" rx="3" fill="#172840" stroke="#2060d0" stroke-width="1.5"/>
  <!-- Person 1 (mentor) -->
  <circle cx="110" cy="100" r="22" fill="#d8ebff" opacity="0.1" stroke="#f5c432" stroke-width="2"/>
  <text x="110" y="88" font-size="9" fill="#f5c432" text-anchor="middle" font-family="monospace">mentor</text>
  <rect x="90" y="118" width="40" height="14" rx="4" fill="#d8ebff" opacity="0.07" stroke="#d8ebff" stroke-width="1"/>
  <!-- Person 2 (new colleague) -->
  <circle cx="250" cy="100" r="22" fill="#d8ebff" opacity="0.1" stroke="#30d080" stroke-width="2"/>
  <text x="250" y="88" font-size="9" fill="#30d080" text-anchor="middle" font-family="monospace">nieuwe</text>
  <text x="250" y="98" font-size="9" fill="#30d080" text-anchor="middle" font-family="monospace">collega</text>
  <rect x="230" y="118" width="40" height="14" rx="4" fill="#d8ebff" opacity="0.07" stroke="#d8ebff" stroke-width="1"/>
  <!-- Speech bubble between them -->
  <rect x="130" y="75" width="100" height="28" rx="8" fill="#0a1828" stroke="#2060d0" stroke-width="1.5"/>
  <text x="180" y="87" font-size="8" fill="#d8ebff" text-anchor="middle" font-family="monospace">Hallo! Ik ben</text>
  <text x="180" y="97" font-size="8" fill="#d8ebff" text-anchor="middle" font-family="monospace">je mentor.</text>
  <!-- Notepad -->
  <rect x="155" y="140" width="50" height="60" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1.5"/>
  <line x1="163" y1="155" x2="197" y2="155" stroke="#6d8faa" stroke-width="1"/>
  <line x1="163" y1="163" x2="197" y2="163" stroke="#6d8faa" stroke-width="1"/>
  <line x1="163" y1="171" x2="185" y2="171" stroke="#6d8faa" stroke-width="1"/>
  <text x="180" y="213" font-size="9" fill="#6d8faa" text-anchor="middle" font-family="monospace">doelen stellen</text>
  <!-- Week 1 badge -->
  <rect x="130" y="230" width="100" height="20" rx="10" fill="#f5c432" opacity="0.15" stroke="#f5c432" stroke-width="1"/>
  <text x="180" y="244" font-size="9" fill="#f5c432" text-anchor="middle" font-family="monospace">Week 1</text>
</svg>
