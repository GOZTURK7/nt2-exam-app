<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <text x="180" y="22" font-size="11" fill="#f5c432" text-anchor="middle" font-family="monospace" font-weight="bold">3 · EVALUATIEGESPREK</text>
  <!-- Table -->
  <rect x="70" y="145" width="220" height="8" rx="3" fill="#172840" stroke="#2060d0" stroke-width="1.5"/>
  <!-- Form/document on table -->
  <rect x="130" y="155" width="100" height="70" rx="3" fill="#0a1828" stroke="#30d080" stroke-width="1.5"/>
  <text x="180" y="170" font-size="8" fill="#30d080" text-anchor="middle" font-family="monospace">EVALUATIE</text>
  <text x="180" y="181" font-size="7" fill="#30d080" text-anchor="middle" font-family="monospace">Mentorprogramma</text>
  <line x1="140" y1="190" x2="220" y2="190" stroke="#172840" stroke-width="1"/>
  <text x="148" y="200" font-size="7" fill="#6d8faa" font-family="monospace">Naam:___________</text>
  <line x1="140" y1="208" x2="220" y2="208" stroke="#172840" stroke-width="1"/>
  <text x="148" y="218" font-size="7" fill="#6d8faa" font-family="monospace">Score: ⭐⭐⭐⭐</text>
  <!-- Pen -->
  <line x1="225" y1="215" x2="240" y2="225" stroke="#d8ebff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <polygon points="240,225 248,228 244,220" fill="#d8ebff" opacity="0.6"/>
  <!-- Person 1 (mentor) signing -->
  <circle cx="95" cy="115" r="22" fill="#d8ebff" opacity="0.1" stroke="#f5c432" stroke-width="2"/>
  <text x="95" y="103" font-size="8" fill="#f5c432" text-anchor="middle" font-family="monospace">mentor</text>
  <!-- Person 2 (colleague) signing -->
  <circle cx="265" cy="115" r="22" fill="#d8ebff" opacity="0.1" stroke="#30d080" stroke-width="2"/>
  <text x="265" y="103" font-size="8" fill="#30d080" text-anchor="middle" font-family="monospace">collega</text>
  <!-- Handshake / mutual sign arrows -->
  <line x1="118" y1="148" x2="132" y2="155" stroke="#f5c432" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="242" y1="148" x2="228" y2="155" stroke="#30d080" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Checkmark completion -->
  <circle cx="180" cy="60" r="22" fill="#30d080" opacity="0.1" stroke="#30d080" stroke-width="2"/>
  <text x="180" y="55" font-size="16" text-anchor="middle" fill="#30d080">✓</text>
  <text x="180" y="70" font-size="7" fill="#30d080" text-anchor="middle" font-family="monospace">klaar!</text>
  <!-- 3 months badge -->
  <rect x="100" y="232" width="160" height="20" rx="10" fill="#f5c432" opacity="0.15" stroke="#f5c432" stroke-width="1"/>
  <text x="180" y="246" font-size="9" fill="#f5c432" text-anchor="middle" font-family="monospace">Na 3 maanden</text>
</svg>
