<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <text x="180" y="22" font-size="11" fill="#f5c432" text-anchor="middle" font-family="monospace" font-weight="bold">1 · ERASMUSBRUG</text>
  <!-- Sky -->
  <rect x="0" y="35" width="360" height="120" fill="#080f1e"/>
  <!-- Water -->
  <rect x="0" y="195" width="360" height="65" fill="#0a1520" stroke="#172840" stroke-width="1"/>
  <!-- Water ripples -->
  <ellipse cx="90" cy="215" rx="50" ry="5" fill="none" stroke="#172840" stroke-width="1"/>
  <ellipse cx="270" cy="225" rx="40" ry="4" fill="none" stroke="#172840" stroke-width="1"/>
  <!-- Bridge pylon (Erasmusbrug) -->
  <line x1="200" y1="60" x2="200" y2="200" stroke="#d8ebff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Bridge cables -->
  <line x1="200" y1="65" x2="90" y2="195" stroke="#d8ebff" stroke-width="1.5" opacity="0.35"/>
  <line x1="200" y1="65" x2="120" y2="195" stroke="#d8ebff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="65" x2="155" y2="195" stroke="#d8ebff" stroke-width="1" opacity="0.25"/>
  <line x1="200" y1="65" x2="310" y2="195" stroke="#d8ebff" stroke-width="1.5" opacity="0.35"/>
  <line x1="200" y1="65" x2="280" y2="195" stroke="#d8ebff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="65" x2="245" y2="195" stroke="#d8ebff" stroke-width="1" opacity="0.25"/>
  <!-- Bridge deck -->
  <rect x="0" y="190" width="360" height="12" rx="2" fill="#172840" stroke="#2060d0" stroke-width="1.5"/>
  <!-- Group of students (silhouettes) -->
  <circle cx="85" cy="175" r="16" fill="#d8ebff" opacity="0.1" stroke="#d8ebff" stroke-width="1"/>
  <circle cx="115" cy="170" r="16" fill="#d8ebff" opacity="0.1" stroke="#d8ebff" stroke-width="1"/>
  <circle cx="145" cy="175" r="16" fill="#d8ebff" opacity="0.1" stroke="#d8ebff" stroke-width="1"/>
  <!-- Phone taking selfie -->
  <rect x="68" y="157" width="14" height="10" rx="2" fill="#f5c432" opacity="0.4" stroke="#f5c432" stroke-width="1"/>
  <!-- Smile faces -->
  <path d="M 80 176 Q 85 180 90 176" stroke="#d8ebff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 110 172 Q 115 176 120 172" stroke="#d8ebff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 140 176 Q 145 180 150 176" stroke="#d8ebff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Label -->
  <rect x="220" y="220" width="130" height="28" rx="6" fill="#f5c432" opacity="0.1" stroke="#f5c432" stroke-width="1"/>
  <text x="285" y="232" font-size="9" fill="#f5c432" text-anchor="middle" font-family="monospace">Erasmusbrug</text>
  <text x="285" y="242" font-size="9" fill="#f5c432" text-anchor="middle" font-family="monospace">📸 groepsfoto!</text>
</svg>
