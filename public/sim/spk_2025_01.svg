<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <!-- Floor -->
  <rect x="0" y="280" width="520" height="60" fill="#080f1e"/>
  <!-- Back wall -->
  <rect x="0" y="0" width="520" height="280" fill="#0d1a2a"/>
  <!-- Window -->
  <rect x="360" y="30" width="130" height="180" rx="4" fill="#0a1828" stroke="#172840" stroke-width="2"/>
  <rect x="360" y="30" width="130" height="90" rx="4" fill="#1a3555" opacity="0.6"/>
  <line x1="425" y1="30" x2="425" y2="210" stroke="#172840" stroke-width="1.5"/>
  <line x1="360" y1="120" x2="490" y2="120" stroke="#172840" stroke-width="1.5"/>
  <!-- Window light rays -->
  <rect x="361" y="31" width="128" height="88" fill="#f5c432" opacity="0.06"/>
  <text x="410" y="240" font-size="11" fill="#6d8faa" text-anchor="middle" font-family="monospace">raam</text>

  <!-- Coffee corner (left) -->
  <rect x="20" y="170" width="100" height="90" rx="6" fill="#080f1e" stroke="#172840" stroke-width="1.5"/>
  <!-- Coffee machine -->
  <rect x="30" y="180" width="40" height="60" rx="4" fill="#0d1a2a" stroke="#2060d0" stroke-width="1.5"/>
  <circle cx="50" cy="200" r="10" fill="#2060d0" opacity="0.3" stroke="#2060d0" stroke-width="1"/>
  <rect x="38" y="215" width="24" height="4" rx="2" fill="#2060d0" opacity="0.5"/>
  <rect x="42" y="225" width="16" height="8" rx="2" fill="#172840"/>
  <!-- Coffee cup -->
  <rect x="35" y="233" width="12" height="8" rx="2" fill="#6d8faa"/>
  <!-- Koelkast -->
  <rect x="78" y="178" width="32" height="64" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1.5"/>
  <rect x="80" y="180" width="28" height="28" rx="2" fill="#0d1a2a"/>
  <rect x="80" y="210" width="28" height="30" rx="2" fill="#0d1a2a"/>
  <rect x="84" y="192" width="4" height="12" rx="1" fill="#2060d0" opacity="0.6"/>
  <text x="70" y="275" font-size="11" fill="#6d8faa" text-anchor="middle" font-family="monospace">koffiehoek</text>

  <!-- Table (center) -->
  <rect x="165" y="200" width="160" height="70" rx="6" fill="#172840" stroke="#2060d0" stroke-width="1.5" opacity="0.9"/>
  <!-- Table legs -->
  <rect x="175" y="265" width="10" height="20" rx="2" fill="#0d1a2a" stroke="#172840" stroke-width="1"/>
  <rect x="305" y="265" width="10" height="20" rx="2" fill="#0d1a2a" stroke="#172840" stroke-width="1"/>
  <!-- Chairs (4) -->
  <rect x="175" y="174" width="36" height="28" rx="4" fill="#0a1828" stroke="#172840" stroke-width="1.5"/>
  <rect x="239" y="174" width="36" height="28" rx="4" fill="#0a1828" stroke="#172840" stroke-width="1.5"/>
  <rect x="175" y="268" width="36" height="28" rx="4" fill="#0a1828" stroke="#172840" stroke-width="1.5"/>
  <rect x="239" y="268" width="36" height="28" rx="4" fill="#0a1828" stroke="#172840" stroke-width="1.5"/>
  <!-- Chair backs -->
  <rect x="177" y="166" width="32" height="10" rx="3" fill="#2060d0" opacity="0.3"/>
  <rect x="241" y="166" width="32" height="10" rx="3" fill="#2060d0" opacity="0.3"/>
  <text x="245" y="250" font-size="11" fill="#6d8faa" text-anchor="middle" font-family="monospace">tafel + 4 stoelen</text>

  <!-- Prikbord (right) -->
  <rect x="355" y="220" width="140" height="100" rx="4" fill="#1a2535" stroke="#f5c432" stroke-width="1.5" opacity="0.8"/>
  <!-- Pins and papers on board -->
  <rect x="365" y="230" width="55" height="30" rx="2" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <text x="393" y="242" font-size="8" fill="#d8ebff" text-anchor="middle" font-family="monospace">Rooster</text>
  <text x="393" y="253" font-size="7" fill="#6d8faa" text-anchor="middle" font-family="monospace">Week 22</text>
  <circle cx="369" cy="230" r="3" fill="#f5c432"/>
  <rect x="430" y="230" width="55" height="30" rx="2" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <text x="458" y="242" font-size="8" fill="#d8ebff" text-anchor="middle" font-family="monospace">Agenda</text>
  <text x="458" y="253" font-size="7" fill="#6d8faa" text-anchor="middle" font-family="monospace">vergadering</text>
  <circle cx="434" cy="230" r="3" fill="#30d080"/>
  <rect x="365" y="268" width="55" height="44" rx="2" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <text x="393" y="283" font-size="7" fill="#6d8faa" text-anchor="middle" font-family="monospace">Ma 8:00–16:00</text>
  <text x="393" y="293" font-size="7" fill="#6d8faa" text-anchor="middle" font-family="monospace">Di 8:00–16:00</text>
  <text x="393" y="303" font-size="7" fill="#6d8faa" text-anchor="middle" font-family="monospace">Wo vrij</text>
  <circle cx="369" cy="268" r="3" fill="#b46aff"/>
  <text x="425" y="330" font-size="11" fill="#6d8faa" text-anchor="middle" font-family="monospace">prikbord</text>

  <!-- Title -->
  <text x="260" y="22" font-size="13" fill="#f5c432" text-anchor="middle" font-family="monospace" font-weight="bold">PERSONEELSRUIMTE</text>
</svg>
