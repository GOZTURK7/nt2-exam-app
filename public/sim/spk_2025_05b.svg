<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <text x="180" y="22" font-size="11" fill="#f5c432" text-anchor="middle" font-family="monospace" font-weight="bold">2 · WEKELIJKS OVERLEG</text>
  <!-- Computer/screen -->
  <rect x="115" y="90" width="130" height="90" rx="4" fill="#0a1828" stroke="#172840" stroke-width="1.5"/>
  <rect x="120" y="95" width="120" height="80" rx="2" fill="#080f1e"/>
  <!-- Screen content -->
  <text x="180" y="118" font-size="8" fill="#58b2ff" text-anchor="middle" font-family="monospace">Taaklijst</text>
  <line x1="130" y1="125" x2="228" y2="125" stroke="#172840" stroke-width="1"/>
  <rect x="130" y="130" width="8" height="8" rx="1" fill="#30d080" opacity="0.6"/>
  <text x="145" y="138" font-size="7" fill="#6d8faa" font-family="monospace">Rapport schrijven</text>
  <rect x="130" y="143" width="8" height="8" rx="1" fill="#30d080" opacity="0.6"/>
  <text x="145" y="151" font-size="7" fill="#6d8faa" font-family="monospace">Vergadering bijwonen</text>
  <rect x="130" y="156" width="8" height="8" rx="1" fill="#f5c432" opacity="0.4"/>
  <text x="145" y="164" font-size="7" fill="#6d8faa" font-family="monospace">Presentatie voorbereiden</text>
  <!-- Screen stand -->
  <rect x="172" y="180" width="16" height="14" rx="2" fill="#172840" stroke="#172840"/>
  <rect x="155" y="192" width="50" height="6" rx="2" fill="#172840"/>
  <!-- Mentor (left) -->
  <circle cx="90" cy="155" r="20" fill="#d8ebff" opacity="0.1" stroke="#f5c432" stroke-width="1.5"/>
  <text x="90" y="145" font-size="8" fill="#f5c432" text-anchor="middle" font-family="monospace">mentor</text>
  <!-- Pointer -->
  <line x1="108" y1="152" x2="118" y2="145" stroke="#f5c432" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- New colleague (right) -->
  <circle cx="270" cy="155" r="20" fill="#d8ebff" opacity="0.1" stroke="#30d080" stroke-width="1.5"/>
  <text x="270" y="145" font-size="8" fill="#30d080" text-anchor="middle" font-family="monospace">collega</text>
  <!-- Question bubble -->
  <rect x="242" y="120" width="60" height="22" rx="6" fill="#0a1828" stroke="#30d080" stroke-width="1.5"/>
  <text x="272" y="131" font-size="7" fill="#d8ebff" text-anchor="middle" font-family="monospace">Hoe doe ik dit?</text>
  <!-- Weekly badge -->
  <rect x="110" y="230" width="140" height="20" rx="10" fill="#f5c432" opacity="0.15" stroke="#f5c432" stroke-width="1"/>
  <text x="180" y="244" font-size="9" fill="#f5c432" text-anchor="middle" font-family="monospace">Elke week</text>
</svg>
