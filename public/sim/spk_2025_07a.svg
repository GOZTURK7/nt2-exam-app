<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <text x="180" y="22" font-size="11" fill="#f5c432" text-anchor="middle" font-family="monospace" font-weight="bold">1 · BEZORGER AAN DE DEUR</text>
  <!-- Door -->
  <rect x="120" y="60" width="120" height="160" rx="5" fill="#0a1828" stroke="#172840" stroke-width="2"/>
  <circle cx="225" cy="140" r="7" fill="#172840" stroke="#6d8faa" stroke-width="1.5"/>
  <rect x="145" y="90" width="30" height="35" rx="2" fill="#080f1e" stroke="#172840" stroke-width="1" opacity="0.6"/>
  <!-- "Niet thuis" sign on door -->
  <rect x="148" y="95" width="26" height="22" rx="2" fill="#0a1828" stroke="#f5c432" stroke-width="1.5"/>
  <text x="161" y="104" font-size="6" fill="#f5c432" text-anchor="middle" font-family="monospace">niet</text>
  <text x="161" y="113" font-size="6" fill="#f5c432" text-anchor="middle" font-family="monospace">thuis</text>
  <!-- Delivery person with package -->
  <circle cx="80" cy="120" r="22" fill="#d8ebff" opacity="0.1" stroke="#d8ebff" stroke-width="1.5"/>
  <!-- Package in arms -->
  <rect x="56" y="140" width="50" height="36" rx="4" fill="#2060d0" opacity="0.3" stroke="#2060d0" stroke-width="1.5"/>
  <text x="81" y="155" font-size="7" fill="#d8ebff" text-anchor="middle" font-family="monospace">PAKKET</text>
  <line x1="56" y1="150" x2="106" y2="150" stroke="#172840" stroke-width="1"/>
  <!-- Doorbell / ring -->
  <rect x="105" y="115" width="15" height="25" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <circle cx="112" cy="127" r="4" fill="#f5c432" opacity="0.5"/>
  <!-- Ring waves -->
  <path d="M 122 120 Q 130 127 122 134" stroke="#f5c432" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 125 117 Q 136 127 125 137" stroke="#f5c432" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Thought bubble showing no one home -->
  <rect x="250" y="70" width="90" height="36" rx="8" fill="#0a1828" stroke="#f5c432" stroke-width="1.5"/>
  <text x="295" y="85" font-size="8" fill="#d8ebff" text-anchor="middle" font-family="monospace">Niemand</text>
  <text x="295" y="98" font-size="8" fill="#d8ebff" text-anchor="middle" font-family="monospace">thuis...</text>
  <circle cx="253" cy="110" r="3" fill="#f5c432" opacity="0.4"/>
  <circle cx="248" cy="118" r="2" fill="#f5c432" opacity="0.4"/>
</svg>
