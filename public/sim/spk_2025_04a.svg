<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <!-- Title -->
  <rect x="0" y="0" width="400" height="34" fill="#080f1e"/>
  <text x="200" y="22" font-size="12" fill="#f5c432" text-anchor="middle" font-family="monospace" font-weight="bold">NU – GLASBAK VOOR INGANG</text>

  <!-- Building facade -->
  <rect x="60" y="50" width="280" height="200" rx="4" fill="#080f1e" stroke="#172840" stroke-width="2"/>
  <!-- Windows -->
  <rect x="80" y="70" width="50" height="40" rx="3" fill="#1a3555" stroke="#172840" stroke-width="1"/>
  <rect x="150" y="70" width="50" height="40" rx="3" fill="#1a3555" stroke="#172840" stroke-width="1"/>
  <rect x="220" y="70" width="50" height="40" rx="3" fill="#1a3555" stroke="#172840" stroke-width="1"/>
  <rect x="290" y="70" width="30" height="40" rx="3" fill="#1a3555" stroke="#172840" stroke-width="1"/>
  <!-- Door -->
  <rect x="162" y="170" width="76" height="80" rx="4" fill="#0a1828" stroke="#2060d0" stroke-width="2"/>
  <circle cx="230" cy="210" r="4" fill="#2060d0" opacity="0.7"/>
  <text x="200" y="200" font-size="8" fill="#6d8faa" text-anchor="middle" font-family="monospace">INGANG</text>

  <!-- Glasbak directly in front of entrance -->
  <rect x="150" y="140" width="100" height="32" rx="6" fill="#2060d0" opacity="0.35" stroke="#2060d0" stroke-width="2"/>
  <rect x="160" y="148" width="25" height="16" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <rect x="190" y="148" width="25" height="16" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <rect x="220" y="148" width="25" height="16" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <text x="200" y="143" font-size="9" fill="#2060d0" text-anchor="middle" font-family="monospace" font-weight="bold">GLASBAK</text>

  <!-- Scattered glass/mess -->
  <ellipse cx="140" cy="175" rx="8" ry="4" fill="#172840" stroke="#2060d0" stroke-width="1" opacity="0.7"/>
  <ellipse cx="260" cy="178" rx="6" ry="3" fill="#172840" stroke="#2060d0" stroke-width="1" opacity="0.7"/>
  <line x1="125" y1="170" x2="135" y2="165" stroke="#2060d0" stroke-width="1.5" opacity="0.5"/>
  <line x1="265" y1="173" x2="272" y2="168" stroke="#2060d0" stroke-width="1.5" opacity="0.5"/>

  <!-- Person walking past, grimacing -->
  <circle cx="100" cy="235" r="12" fill="#d8ebff" opacity="0.12" stroke="#d8ebff" stroke-width="1.5"/>
  <line x1="100" y1="247" x2="100" y2="275" stroke="#d8ebff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="100" y1="255" x2="85" y2="265" stroke="#d8ebff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="100" y1="255" x2="115" y2="265" stroke="#d8ebff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- noise lines -->
  <text x="88" y="224" font-size="14" fill="#f5c432" opacity="0.8">!</text>

  <!-- Problem label -->
  <rect x="10" y="255" width="110" height="36" rx="6" fill="#f5c432" opacity="0.1" stroke="#f5c432" stroke-width="1"/>
  <text x="65" y="269" font-size="9" fill="#f5c432" text-anchor="middle" font-family="monospace">Overlast: lawaai</text>
  <text x="65" y="282" font-size="9" fill="#f5c432" text-anchor="middle" font-family="monospace">+ rommel bij ingang</text>
</svg>
