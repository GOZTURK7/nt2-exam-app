<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="background:#0d1a2a;font-family:system-ui,sans-serif">
  <!-- Title -->
  <rect x="0" y="0" width="400" height="34" fill="#080f1e"/>
  <text x="200" y="22" font-size="12" fill="#30d080" text-anchor="middle" font-family="monospace" font-weight="bold">VOORSTEL – GLASBAK VERPLAATST</text>

  <!-- Building facade -->
  <rect x="60" y="50" width="200" height="200" rx="4" fill="#080f1e" stroke="#172840" stroke-width="2"/>
  <!-- Windows -->
  <rect x="80" y="70" width="45" height="38" rx="3" fill="#1a3555" stroke="#172840" stroke-width="1"/>
  <rect x="140" y="70" width="45" height="38" rx="3" fill="#1a3555" stroke="#172840" stroke-width="1"/>
  <rect x="200" y="70" width="40" height="38" rx="3" fill="#1a3555" stroke="#172840" stroke-width="1"/>
  <!-- Door (clear path) -->
  <rect x="125" y="170" width="70" height="80" rx="4" fill="#0a1828" stroke="#30d080" stroke-width="2"/>
  <circle cx="185" cy="210" r="4" fill="#30d080" opacity="0.7"/>
  <text x="160" y="200" font-size="8" fill="#30d080" text-anchor="middle" font-family="monospace">INGANG</text>

  <!-- Clean path arrows -->
  <line x1="100" y1="280" x2="100" y2="240" stroke="#30d080" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="100,235 93,247 107,247" fill="#30d080" opacity="0.6"/>

  <!-- Parking area (right side) -->
  <rect x="280" y="90" width="100" height="160" rx="4" fill="#080f1e" stroke="#172840" stroke-width="1.5"/>
  <!-- Parking markings -->
  <line x1="310" y1="90" x2="310" y2="250" stroke="#172840" stroke-width="1" stroke-dasharray="8,6"/>
  <line x1="340" y1="90" x2="340" y2="250" stroke="#172840" stroke-width="1" stroke-dasharray="8,6"/>
  <text x="330" y="108" font-size="9" fill="#6d8faa" text-anchor="middle" font-family="monospace">P</text>
  <text x="330" y="120" font-size="8" fill="#6d8faa" text-anchor="middle" font-family="monospace">50m</text>

  <!-- Green screen around glasbak -->
  <rect x="282" y="145" width="96" height="90" rx="6" fill="#30d080" opacity="0.08" stroke="#30d080" stroke-width="1.5"/>
  <!-- Green bushes/screen -->
  <ellipse cx="290" cy="148" rx="14" ry="8" fill="#30d080" opacity="0.3"/>
  <ellipse cx="308" cy="148" rx="14" ry="8" fill="#30d080" opacity="0.3"/>
  <ellipse cx="326" cy="148" rx="14" ry="8" fill="#30d080" opacity="0.3"/>
  <ellipse cx="344" cy="148" rx="14" ry="8" fill="#30d080" opacity="0.3"/>
  <ellipse cx="362" cy="148" rx="14" ry="8" fill="#30d080" opacity="0.3"/>
  <line x1="282" y1="155" x2="378" y2="155" stroke="#30d080" stroke-width="1" opacity="0.4"/>

  <!-- Glasbak in parking lot -->
  <rect x="292" y="168" width="84" height="28" rx="6" fill="#2060d0" opacity="0.35" stroke="#2060d0" stroke-width="2"/>
  <rect x="300" y="175" width="20" height="14" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <rect x="326" y="175" width="20" height="14" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <rect x="352" y="175" width="20" height="14" rx="3" fill="#0a1828" stroke="#172840" stroke-width="1"/>
  <text x="334" y="166" font-size="8" fill="#2060d0" text-anchor="middle" font-family="monospace" font-weight="bold">GLASBAK</text>
  <text x="334" y="215" font-size="8" fill="#30d080" text-anchor="middle" font-family="monospace">groen scherm</text>

  <!-- Distance arrow -->
  <line x1="265" y1="200" x2="285" y2="200" stroke="#f5c432" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="210" y="203" font-size="9" fill="#f5c432" font-family="monospace">50 m</text>

  <!-- Checkmark label -->
  <rect x="10" y="258" width="130" height="32" rx="6" fill="#30d080" opacity="0.1" stroke="#30d080" stroke-width="1"/>
  <text x="75" y="272" font-size="9" fill="#30d080" text-anchor="middle" font-family="monospace">Geen overlast bij ingang</text>
  <text x="75" y="283" font-size="9" fill="#30d080" text-anchor="middle" font-family="monospace">✓ rustig + afgeschermd</text>
</svg>
